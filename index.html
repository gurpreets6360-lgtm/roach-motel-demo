<!DOCTYPE html>
<html>
<head>
<title>Roach Motel Demo</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
  padding-top: 80px;
}

.box {
  background: white;
  width: 350px;
  margin: auto;
  padding: 20px;
  border-radius: 10px;
}

.hidden {
  display: none;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.primary {
  background: green;
  color: white;
  width: 100%;
}

.secondary {
  background: none;
  color: gray;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="box">
  <h1>Roach Motel Dark Pattern</h1>
  <p>Click next</p>
  <button onclick="showPage2()">Next</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="box hidden">
  <h2>Start Free Trial</h2>

  <p><b>Example:</b> Easy signup but difficult cancellation.</p>
  <p><b>Impact:</b> Users may forget to cancel and get charged.</p>

  <button class="primary" onclick="startTrial()">
    Start Free Trial
  </button>

  <br>

  <button class="secondary" onclick="showCancel()">
    No thanks
  </button>
</div>

<!-- PAGE 3 -->
<div id="cancelPage" class="box hidden">
  <h2>Cancel Subscription</h2>
  <p>Complete all steps</p>

  <button onclick="step1()">Step 1</button>
  <button onclick="step2()">Step 2</button>
  <button onclick="step3()">Final Cancel</button>
</div>

<script>
function showPage2(){
  document.getElementById("page1").classList.add("hidden");
  document.getElementById("page2").classList.remove("hidden");
}

function showCancel(){
  document.getElementById("page2").classList.add("hidden");
  document.getElementById("cancelPage").classList.remove("hidden");
}

function startTrial(){
  alert("You are subscribed!");
}

function step1(){ alert("Are you sure?"); }
function step2(){ alert("Confirm again"); }
function step3(){ alert("Cancelled"); }
</script>

</body>
</html>
