<!DOCTYPE html>
<html>
<head>
<title>Premium Plan</title>
<style>
body {font-family: Arial; background:black; color:white; text-align:center;}

.primary {
  background:red;
  color:white;
  padding:15px;
  width:250px;
  border:none;
}

.secondary {
  font-size:12px;
  color:gray;
  background:none;
  border:none;
}

.hidden {display:none;}
</style>
</head>

<body>

<h1>Upgrade to Premium</h1>

<div id="main">
<button class="primary" onclick="alert('Subscribed')">Join Now</button>
<br><br>
<button class="secondary" onclick="showCancel()">No thanks</button>
</div>

<div id="cancel" class="hidden">
<h2>Cancel Membership</h2>
<button>Confirm</button>
<button>Verify</button>
<button>Final Cancel</button>
</div>

<script>
function showCancel(){
  document.getElementById("main").style.display="none";
  document.getElementById("cancel").style.display="block";
}
</script>

</body>
</html>
